# =============================================================================
# Prefix: C-s
# =============================================================================
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# =============================================================================
# General
# =============================================================================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 10000
set -g escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g allow-rename off

# =============================================================================
# Keybindings
# =============================================================================
bind r source-file ~/.tmux.conf \; display "Config reloaded"

unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind -r n next-window
bind -r p previous-window

setw -g mode-keys vi
bind v copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

bind x kill-pane
bind X kill-window

set -g mouse on

# =============================================================================
# Nord theme
# =============================================================================
set -g status-position bottom
set -g status-style "bg=#2e3440,fg=#d8dee9"
set -g status-left ""
set -g status-left-length 0
set -g status-right "#[fg=#4c566a,bg=#2e3440] #(pmset -g batt | grep -Eo '[0-9]+%%' | head -1)  %a %d %b  #[fg=#88c0d0]%H:%M "
set -g status-right-length 40

set -g window-status-format "#[bg=#3b4252,fg=#4c566a] #I #W "
set -g window-status-current-format "#[bg=#88c0d0,fg=#2e3440,bold] #I #[fg=#3b4252]#W #{?window_zoomed_flag,#[bg=#d08770,fg=#2e3440] Z ,}"
set -g window-status-separator ""

set -g pane-border-style "fg=#3b4252"
set -g pane-active-border-style "fg=#88c0d0"
set -g pane-border-status off

set -g message-style "bg=#3b4252,fg=#88c0d0"

# =============================================================================
# Plugins (TPM)
# =============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

run '~/.tmux/plugins/tpm/tpm'
